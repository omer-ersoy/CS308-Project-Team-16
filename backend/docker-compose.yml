version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cs308-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cs308_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cs308_store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
